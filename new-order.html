<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новая заявка - LADA Автосалон</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <header class="header">
            <div class="logo">
                <img src="logo/1.png" alt="Логотип" class="logo-img">
                <span>LADA Центр</span>
            </div>
            <div class="header-user" id="headerUser"></div>
        </header>

        <div class="main-container">
            <nav class="vertical-menu">
                <ul>
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="models.html">Модельный ряд</a></li>
                    <li><a href="register.html">Регистрация</a></li>
                    <li><a href="login.html">Авторизация</a></li>
                    <li><a href="orders.html">Мои заявки</a></li>
                    <li><a href="new-order.html" class="active">Новая заявка</a></li>
                </ul>
            </nav>

            <main class="content">
                <h1>Оформление заявки на покупку</h1>
                <form id="orderForm" class="form-card">
                    <div class="form-group">
                        <label for="address">Ваш адрес *</label>
                        <input type="text" id="address" name="address" required placeholder="г. Москва, ул. Примерная, д. 1">
                    </div>
                    <div class="form-group">
                        <label for="contact">Контактные данные *</label>
                        <input type="text" id="contact" name="contact" required placeholder="Телефон или email">
                    </div>
                    <div class="form-group">
                        <label for="date">Желаемая дата *</label>
                        <input type="date" id="date" name="date" required>
                    </div>
                    <div class="form-group">
                        <label for="time">Желаемое время *</label>
                        <input type="time" id="time" name="time" required>
                    </div>
                    <div class="form-group">
                        <label for="service">Вид услуги *</label>
                        <select id="service" name="service" required>
                            <option value="">Выберите услугу</option>
                            <option value="Тест-драйв LADA Vesta">Тест-драйв LADA Vesta</option>
                            <option value="Тест-драйв LADA Granta">Тест-драйв LADA Granta</option>
                            <option value="Тест-драйв LADA Niva">Тест-драйв LADA Niva</option>
                            <option value="Консультация по покупке">Консультация по покупке</option>
                            <option value="Оформление кредита">Оформление кредита</option>
                            <option value="Trade-in оценка">Trade-in оценка</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Тип оплаты *</label>
                        <div class="radio-group">
                            <label><input type="radio" name="payment" value="Наличные" required> Наличные</label>
                            <label><input type="radio" name="payment" value="Банковская карта"> Банковская карта</label>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">Отправить заявку</button>
                    <div id="orderMessage" class="message-area"></div>
                </form>
                <p><a href="orders.html">Вернуться к истории заявок</a></p>
            </main>
        </div>

        <footer class="footer">
            <p>&copy; 2025 LADA Центр. Все права защищены.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
