<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация - LADA Автосалон</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <header class="header">
            <div class="logo">
                <img src="logo/1.png" alt="Логотип" class="logo-img">
                <span>LADA Центр</span>
            </div>
            <div class="header-user" id="headerUser">
                <span class="guest-text">Гость</span>
                <a href="login.html" class="login-link">Войти</a>
            </div>
        </header>

        <div class="main-container">
            <nav class="vertical-menu">
                <ul>
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="models.html">Модельный ряд</a></li>
                    <li><a href="register.html">Регистрация</a></li>
                    <li><a href="login.html" class="active">Авторизация</a></li>
                    <li><a href="orders.html">Мои заявки</a></li>
                    <li><a href="new-order.html">Новая заявка</a></li>
                </ul>
            </nav>

            <main class="content">
                <h1>Вход в личный кабинет</h1>
                <form id="loginForm" class="form-card">
                    <div class="form-group">
                        <label for="login">Логин *</label>
                        <input type="text" id="login" name="login" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Пароль *</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn-primary">Войти</button>
                    <div id="loginMessage" class="message-area error"></div>
                </form>
                <p>Нет аккаунта? <a href="register.html">Зарегистрируйтесь</a></p>
            </main>
        </div>

        <footer class="footer">
            <p>&copy; 2025 LADA Центр. Все права защищены.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
